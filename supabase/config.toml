project_id = "generico-web-local"

[api]
enabled = true
port = 55321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 55322
shadow_port = 55320
major_version = 17

[studio]
enabled = true
port = 55323

[local_smtp]
enabled = true
port = 55324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.vector]
enabled = false

[analytics]
enabled = true
port = 55327
backend = "postgres"

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://localhost:5173", "http://127.0.0.1:5500", "http://localhost:5500"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_signup = false

[auth.sms]
enable_signup = true
enable_confirmations = false

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[functions.dispatch-whatsapp]
verify_jwt = true

[functions.schedule-reminders]
verify_jwt = true

[functions.dispatch-telegram]
verify_jwt = true

[functions.admin-create-socio]
verify_jwt = true
